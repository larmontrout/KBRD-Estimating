: 600; cursor: pointer; color: rgb(184, 194, 196);"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg> Back</button><button style="display: inline-flex; align-items: center; gap: 6px; padding: 12px 20px; background: rgb(0, 153, 185); color: rgb(13, 15, 16); border-width: medium; border-style: none; border-color: currentcolor; border-image: initial; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;">Next <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg></button></div><div style="border-top: 1px solid rgb(42, 46, 48); margin-top: 40px; padding-top: 16px; font-size: 12px; color: rgb(107, 117, 120); display: flex; align-items: center; justify-content: space-between; gap: 6px; flex-wrap: wrap;"><div style="display: flex; align-items: center; gap: 6px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0;"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><path d="M8 13h2"></path><path d="M14 13h2"></path><path d="M8 17h2"></path><path d="M14 17h2"></path></svg>Using built-in default pricing.</div><a href="file:///C:/Users/lmaxd/Downloads/admin.html" style="color: rgb(107, 117, 120); text-decoration: underline;">Pricing admin</a></div></div></div></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

// ---------- Icons (inline SVG, no external icon lib needed) ----------
const Icon = ({ d, size = 18, ...props }) => (

const BathIcon = (p) => <Icon {...p} d={<>

</>} />;
const ChevronRight = (p) => <Icon {...p} d={<polyline points="9 18 15 12 9 6" />} />;
const ChevronLeft = (p) => <Icon {...p} d={<polyline points="15 18 9 12 15 6" />} />;
const Upload = (p) => <Icon {...p} d={<>

const RotateCcw = (p) => <Icon {...p} d={<>

</>} />;
const FileSpreadsheet = (p) => <Icon {...p} d={<>
  <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />

const Mail = (p) => <Icon {...p} d={<>

</>} />;
const Check = (p) => <Icon {...p} d={<polyline points="20 6 9 17 4 12" />} />;

// ---------- Default pricing data ----------
const DEFAULT_ROWS = [
  ["Room Floor", "Floor Finish", "Tile", "sq ft", 12, 18, 28, "Standard ceramic/porcelain tile, installed"],
  ["Room Floor", "Floor Finish", "LVP", "sq ft", 6, 9, 14, "Luxury vinyl plank"],
  ["Room Floor", "Floor Finish", "Cultured Marble", "sq ft", 14, 20, 30, "Seamless cultured marble flooring"],

  ["Room Walls", "Wall Finish", "Paint", "sq ft", 2, 3, 5, "Prep + paint, 2 coats"],
  ["Room Walls", "Wall Finish", "Tile Wainscot", "sq ft", 15, 22, 32, "Half-wall tile accent"],
  ["Room Walls", "Wall Finish", "Full Tile", "sq ft", 14, 20, 30, "Full height tile walls"],

  ["Shower", "Base Material", "Tile Base", "sq ft", 18, 26, 38, "Custom tiled shower pan/base"],
  ["Shower", "Base Material", "Cultured Marble Base", "each", 700, 1100, 1700, "Prefab cultured marble base, per unit"],
  ["Shower", "Base Material", "Acrylic Base", "each", 400, 650, 950, "Standard acrylic shower pan"],

  ["Shower", "Wall Surround", "Tile Surround", "sq ft", 18, 26, 38, "Tile to 8ft (or ceiling ht if lower)"],
  ["Shower", "Wall Surround", "Cultured Marble Surround", "sq ft", 22, 32, 46, "Seamless cultured marble panels"],
  ["Shower", "Wall Surround", "Acrylic Surround", "sq ft", 12, 16, 22, "Prefab acrylic wall kit"],

  ["Shower", "Tub Unit", "Standard Tub", "each", 600, 950, 1500, "Alcove tub, installed"],
  ["Shower", "Tub Unit", "Soaking Tub", "each", 1200, 2200, 4000, "Freestanding or drop-in soaking tub"],

  ["Shower", "Enclosure", "Shower Curtain Rod", "each", 60, 90, 140, "Basic rod + curtain"],
  ["Shower", "Enclosure", "Sliding Glass Door", "each", 450, 750, 1200, "Framed or semi-frameless slider"],
  ["Shower", "Enclosure", "Frameless Glass Door", "each", 900, 1500, 2400, "Frameless hinged glass panel/door"],

  ["Vanity", "Vanity Cabinet", "Standard", "linear ft", 150, 250, 400, "Stock cabinet + laminate/cultured marble top"],
  ["Vanity", "Vanity Cabinet", "Custom", "linear ft", 300, 450, 700, "Custom/semi-custom cabinet + stone top"],

  ["Fixtures", "Toilet", "Standard", "each", 350, 500, 750, "Standard height, installed"],
  ["Fixtures", "Toilet", "Comfort Height / Upgraded", "each", 500, 700, 1100, "Comfort height, soft-close, upgraded"],

  ["Fixtures", "Vanity Faucet", "Standard", "each", 120, 220, 380, "Per faucet, installed"],
  ["Fixtures", "Vanity Faucet", "Designer", "each", 250, 450, 800, "Designer/brand-name faucet"],

  ["Fixtures", "Shower Trim/Valve", "Standard", "each", 250, 450, 750, "Valve + trim + showerhead"],
  ["Fixtures", "Shower Trim/Valve", "Multi-function/Rain", "each", 500, 900, 1600, "Rain head, handheld, body sprays etc."],

  ["Electrical", "Electrical Scope", "None", "flat", 0, 0, 0, "No electrical changes"],
  ["Electrical", "Electrical Scope", "Update Fixtures/GFCI", "flat", 300, 500, 800, "Swap fixtures, add GFCI outlet"],
  ["Electrical", "Electrical Scope", "Add Lighting/Rewire", "flat", 800, 1400, 2200, "New can lights, dedicated circuits, rewiring"],

  ["Electrical", "Ventilation Fan", "Keep Existing", "flat", 0, 0, 0, "No change"],
  ["Electrical", "Ventilation Fan", "Replace Standard", "flat", 250, 350, 500, "Standard exhaust fan replacement"],
  ["Electrical", "Ventilation Fan", "Upgrade (Quiet/Humidity Sensor)", "flat", 400, 600, 900, "Premium quiet fan w/ humidity sensor"],

  ["Fixtures", "Mirror", "Standard", "each", 100, 180, 300, "Stock mirror, installed"],
  ["Fixtures", "Mirror", "Custom/Lighted", "each", 300, 550, 950, "Custom size or LED-lighted mirror"],

  ["Fixtures", "Accessories Package", "Builder Grade", "flat", 100, 175, 275, "Towel bars, hooks, TP holder - basic"],
  ["Fixtures", "Accessories Package", "Designer", "flat", 250, 450, 750, "Matching designer hardware set"],

  ["General", "Demo & Disposal", "Standard Bath Demo", "flat", 600, 900, 1400, "Demo of existing finishes, dumpster/haul-away"],
];

function rowsToPricing(rows) {
  const map = {};
  rows.forEach(([cat, item, option, unit, good, better, best, notes]) => {
    if (!map[item]) map[item] = { category: cat, options: [] };
    map[item].options.push({ option, unit, good: Number(good) || 0, better: Number(better) || 0, best: Number(best) || 0, notes: notes || '' });
  });
  return map;
}

const DEFAULT_PRICING = rowsToPricing(DEFAULT_ROWS);

function fmt(n) {
  return Math.round(n).toLocaleString('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 });
}

function OptionCard({ label, sub, price, active, onClick }) {
  return (
    <div
      onClick={onClick}
      style={{
        border: active ? '2px solid #0099B9' : '1px solid #2A2E30',
        borderRadius: 10,
        padding: '14px 16px',
        cursor: 'pointer',
        background: active ? '#1C2628' : '#16191B',
        display: 'flex',
        justifyContent: 'space-between',
        alignItems: 'center',
        gap: 12,
        transition: 'all 0.12s ease',
      }}
    >
      <div>
        <div style={{ fontWeight: 600, fontSize: 14, display: 'flex', alignItems: 'center', gap: 8 }}>
          {active && <Check size={15} strokeWidth={3} color="#0099B9" />}
          {label}
        </div>
        {sub && <div style={{ fontSize: 12, color: '#8A9598', marginTop: 3 }}>{sub}</div>}
      </div>
      {price && <div style={{ fontSize: 12, color: '#6FA8B8', whiteSpace: 'nowrap', fontWeight: 600 }}>{price}</div>}
    </div>
  );
}

function StepShell({ title, hint, children }) {
  return (
    <div>
      <h2 style={{ fontFamily: "'Fraunces', serif", fontSize: 22, fontWeight: 600, margin: '0 0 4px' }}>{title}</h2>
      {hint && <div style={{ fontSize: 13, color: '#8A9598', marginBottom: 18 }}>{hint}</div>}
      {children}
    </div>
  );
}

function NumInput({ value, onChange, suffix, width = 110, placeholder }) {
  return (
    <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8 }}>
      <input
        type="number"
        min="0"
        value={value}
        onChange={(e) => onChange(e.target.value)}
        placeholder={placeholder}
        style={{
          width, padding: '12px 14px', fontSize: 17, fontWeight: 600,
          border: '1px solid #3A3F42', borderRadius: 8, outline: 'none', color: '#F2F4F4', background: '#16191B',
        }}
      />
      {suffix && <span style={{ color: '#8A9598', fontSize: 14 }}>{suffix}</span>}
    </div>
  );
}

const SHOWER_CONFIGS = [
  { key: 'combo', label: 'Tub/Shower Combo', sub: 'Standard alcove tub with shower above' },
  { key: 'walkin', label: 'Walk-in Shower', sub: 'Custom shower, no tub — enter dimensions' },
  { key: 'soaking', label: 'Soaking Tub', sub: 'Standalone or drop-in tub, no separate shower' },
  { key: 'showeronly', label: 'Shower Only', sub: 'Smaller prefab-style shower stall' },
];

const STORAGE_KEY_PRICING = 'bathroom-pricing-data-v1';
const STORAGE_KEY_RECIPIENTS = 'bathroom-recipients-v1';

function BathroomEstimateApp() {
  const [pricing, setPricing] = useState(DEFAULT_PRICING);
  const [step, setStep] = useState(0);
  const [recipients, setRecipients] = useState(['estimator@yourcompany.com']);
  const [recipientInput, setRecipientInput] = useState('');
  const [clientName, setClientName] = useState('');

  const [roomL, setRoomL] = useState('');
  const [roomW, setRoomW] = useState('');
  const [wallHeight, setWallHeight] = useState('8');
  const [vaulted, setVaulted] = useState(null);
  const [floorFinish, setFloorFinish] = useState(null);
  const [wallFinish, setWallFinish] = useState(null);
  const [showerConfig, setShowerConfig] = useState(null);
  const [showerL, setShowerL] = useState('');
  const [showerW, setShowerW] = useState('');
  const [showerBase, setShowerBase] = useState(null);
  const [showerSurround, setShowerSurround] = useState(null);
  const [tubUnit, setTubUnit] = useState(null);
  const [enclosure, setEnclosure] = useState(null);
  const [vanityWidth, setVanityWidth] = useState('');
  const [vanityType, setVanityType] = useState(null);
  const [toiletNew, setToiletNew] = useState(null);
  const [vanityFaucetCount, setVanityFaucetCount] = useState('1');
  const [vanityFaucet, setVanityFaucet] = useState(null);
  const [showerTrim, setShowerTrim] = useState(null);
  const [electricalScope, setElectricalScope] = useState(null);
  const [ventFan, setVentFan] = useState(null);
  const [mirror, setMirror] = useState(null);
  const [accessories, setAccessories] = useState(null);
  const [includeDemo, setIncludeDemo] = useState(null);

  const [pricingSource, setPricingSource] = useState(null); // null (loading) | 'default' | 'remote' | 'file'

  useEffect(() => {
    try {
      const storedR = localStorage.getItem(STORAGE_KEY_RECIPIENTS);
      if (storedR) setRecipients(JSON.parse(storedR));
    } catch (e) {}

    // Load shared pricing from Firestore (set via the admin page).
    // Falls back to the bundled defaults if Firestore has no data yet,
    // or to pricing.json if present, in that order.
    (async () => {
      try {
        if (window.__loadPricing) {
          const rows = await window.__loadPricing();
          if (rows && rows.length > 0) {
            const flat = rows.map((r) => [r.category, r.item, r.option, r.unit, r.good, r.better, r.best, r.notes]);
            setPricing(rowsToPricing(flat));
            setPricingSource('remote');
            return;
          }
        }
      } catch (e) {}

      // Fallback: try pricing.json in the repo
      try {
        const r = await fetch('./pricing.json?t=' + Date.now());
        if (r.ok) {
          const rows = await r.json();
          if (Array.isArray(rows) && rows.length > 0) {
            const flat = rows.map((row) => [row.category, row.item, row.option, row.unit, row.good, row.better, row.best, row.notes]);
            setPricing(rowsToPricing(flat));
            setPricingSource('file');
            return;
          }
        }
      } catch (e) {}

      setPricing(DEFAULT_PRICING);
      setPricingSource('default');
    })();
  }, []);

  const saveRecipients = (list) => {
    setRecipients(list);
    try { localStorage.setItem(STORAGE_KEY_RECIPIENTS, JSON.stringify(list)); } catch (e) {}
  };

  const roomLNum = parseFloat(roomL) || 0;
  const roomWNum = parseFloat(roomW) || 0;
  const roomSfNum = roomLNum * roomWNum;
  const wallHeightNum = parseFloat(wallHeight) || 8;
  const showerLNum = parseFloat(showerL) || 0;
  const showerWNum = parseFloat(showerW) || 0;
  const vanityWidthNum = parseFloat(vanityWidth) || 0;
  const faucetCountNum = parseInt(vanityFaucetCount) || 1;

  const roomPerimeter = (roomLNum + roomWNum) * 2;
  const ceilingSf = vaulted === true ? roomSfNum * 1.25 : roomSfNum;
  const roomWallSf = roomPerimeter * wallHeightNum;

  const showerWallHeight = Math.min(8, wallHeightNum);
  const showerPerimeter = (showerLNum + showerWNum) * 2;
  const showerWallSf = showerPerimeter * showerWallHeight;
  const showerFloorSf = showerLNum * showerWNum;

  const needsShowerDims = showerConfig === 'walkin' || showerConfig === 'showeronly';

  const getOptions = (item) => (pricing[item] ? pricing[item].options : []);
  const findOption = (item, key) => getOptions(item).find((o) => o.option === key);

  const lineItems = useMemo(() => {
    const items = [];
    const push = (label, opt, qty, qtyLabel) => {
      if (!opt) return;
      items.push({
        label, optionName: opt.option, qty, qtyLabel,
        good: opt.good * qty, better: opt.better * qty, best: opt.best * qty, notes: opt.notes,
      });
    };

    if (floorFinish) {
      const opt = findOption('Floor Finish', floorFinish);
      push('Floor Finish', opt, roomSfNum, `${roomSfNum.toFixed(0)} sf`);
    }
    if (wallFinish) {
      const opt = findOption('Wall Finish', wallFinish);
      const adjustedWallSf = Math.max(roomWallSf - (needsShowerDims ? showerWallSf : 0), 0);
      push('Room Wall Finish', opt, adjustedWallSf, `${adjustedWallSf.toFixed(0)} sf`);
    }
    if (showerBase) {
      const opt = findOption('Base Material', showerBase);
      const qty = opt.unit === 'sq ft' ? (needsShowerDims ? showerFloorSf : 12) : 1;
      push('Shower/Tub Base', opt, qty, opt.unit === 'sq ft' ? `${qty.toFixed(0)} sf` : '1 unit');
    }
    if (showerSurround) {
      const opt = findOption('Wall Surround', showerSurround);
      const fallbackSurroundSf = (5 + 2.5 + 5) * showerWallHeight;
      const finalQty = opt.unit === 'sq ft' ? (needsShowerDims ? showerWallSf : fallbackSurroundSf) : 1;
      push('Shower/Tub Surround', opt, finalQty, opt.unit === 'sq ft' ? `${finalQty.toFixed(0)} sf` : '1 unit');
    }
    if (tubUnit) {
      const opt = findOption('Tub Unit', tubUnit);
      push('Tub', opt, 1, '1 unit');
    }
    if (enclosure) {
      const opt = findOption('Enclosure', enclosure);
      push('Shower Enclosure', opt, 1, '1 unit');
    }
    if (vanityType && vanityWidthNum > 0) {
      const opt = findOption('Vanity Cabinet', vanityType);
      push('Vanity Cabinet', opt, vanityWidthNum, `${vanityWidthNum} linear ft`);
    }
    if (toiletNew && toiletNew !== 'none') {
      const opt = findOption('Toilet', toiletNew);
      push('Toilet', opt, 1, '1 unit');
    }
    if (vanityFaucet) {
      const opt = findOption('Vanity Faucet', vanityFaucet);
      push('Vanity Faucet(s)', opt, faucetCountNum, `${faucetCountNum} unit(s)`);
    }
    if (showerTrim) {
      const opt = findOption('Shower Trim/Valve', showerTrim);
      push('Shower Trim/Valve', opt, 1, '1 unit');
    }
    if (electricalScope) {
      const opt = findOption('Electrical Scope', electricalScope);
      push('Electrical', opt, 1, '');
    }
    if (ventFan) {
      const opt = findOption('Ventilation Fan', ventFan);
      push('Ventilation Fan', opt, 1, '');
    }
    if (mirror && mirror !== 'none') {
      const opt = findOption('Mirror', mirror);
      push('Mirror', opt, 1, '1 unit');
    }
    if (accessories && accessories !== 'none') {
      const opt = findOption('Accessories Package', accessories);
      push('Accessories', opt, 1, '');
    }
    if (includeDemo) {
      const opt = findOption('Demo & Disposal', 'Standard Bath Demo');
      if (opt) push('Demo & Disposal', opt, 1, '');
    }

    return items;
  }, [pricing, roomSfNum, roomWallSf, floorFinish, wallFinish, showerBase, showerSurround, tubUnit, enclosure,
      vanityType, vanityWidthNum, toiletNew, vanityFaucet, faucetCountNum, showerTrim, electricalScope, ventFan,
      mirror, accessories, includeDemo, needsShowerDims, showerFloorSf, showerWallSf, showerWallHeight, roomPerimeter]);

  const totals = useMemo(() => {
    return lineItems.reduce((acc, li) => ({
      good: acc.good + li.good,
      better: acc.better + li.better,
      best: acc.best + li.best,
    }), { good: 0, better: 0, best: 0 });
  }, [lineItems]);

  const steps = [
    'intro', 'geometry', 'floor', 'walls', 'showerConfig', 'showerDims', 'showerBase', 'showerSurround',
    'tubUnit', 'enclosure', 'vanity', 'toilet', 'vanityFaucet', 'showerTrim', 'electrical', 'ventFan',
    'mirror', 'accessories', 'demo', 'summary'
  ];

  const visibleSteps = steps.filter((s) => {
    if (s === 'showerDims') return needsShowerDims;
    if (s === 'showerBase') return showerConfig !== null;
    if (s === 'showerSurround') return showerConfig !== null;
    if (s === 'tubUnit') return showerConfig === 'combo' || showerConfig === 'soaking';
    return true;
  });

  const stepKey = visibleSteps[step];
  const stepIndex = step;
  const totalSteps = visibleSteps.length;

  const goNext = () => setStep((s) => Math.min(s + 1, visibleSteps.length - 1));
  const goBack = () => setStep((s) => Math.max(s - 1, 0));

  const canAdvance = () => {
    switch (stepKey) {
      case 'intro': return true;
      case 'geometry': return roomLNum > 0 && roomWNum > 0 && wallHeightNum > 0 && vaulted !== null;
      case 'floor': return floorFinish !== null;
      case 'walls': return wallFinish !== null;
      case 'showerConfig': return showerConfig !== null;
      case 'showerDims': return showerLNum > 0 && showerWNum > 0;
      case 'showerBase': return showerBase !== null;
      case 'showerSurround': return showerSurround !== null;
      case 'tubUnit': return tubUnit !== null;
      case 'enclosure': return enclosure !== null;
      case 'vanity': return vanityType !== null;
      case 'toilet': return toiletNew !== null;
      case 'vanityFaucet': return vanityFaucet !== null;
      case 'showerTrim': return showerTrim !== null;
      case 'electrical': return electricalScope !== null;
      case 'ventFan': return ventFan !== null;
      case 'mirror': return mirror !== null;
      case 'accessories': return accessories !== null;
      case 'demo': return includeDemo !== null;
      default: return true;
    }
  };

  const buildNotes = () => {
    const lines = [];
    lines.push(`BATHROOM REMODEL — CONCEPT SCOPE & ESTIMATE NOTES`);
    lines.push(`Date: ${new Date().toLocaleDateString()}`);
    if (clientName) lines.push(`Client / Project: ${clientName}`);
    lines.push('');
    lines.push(`ROOM DIMENSIONS`);
    lines.push(`- Room size: ${roomLNum} ft x ${roomWNum} ft (${roomSfNum.toFixed(0)} sf floor)`);
    lines.push(`- Wall height: ${wallHeightNum} ft`);
    lines.push(`- Vaulted ceiling: ${vaulted ? 'Yes (+25% ceiling area est.)' : 'No'}`);
    lines.push(`- Perimeter: ${roomPerimeter.toFixed(1)} ft | Wall area: ${roomWallSf.toFixed(0)} sf | Ceiling area: ${ceilingSf.toFixed(0)} sf`);
    lines.push('');
    lines.push(`SHOWER / TUB CONFIGURATION`);
    const cfg = SHOWER_CONFIGS.find((c) => c.key === showerConfig);
    lines.push(`- Type: ${cfg ? cfg.label : '—'}`);
    if (needsShowerDims) {
      lines.push(`- Shower dimensions: ${showerLNum} ft x ${showerWNum} ft (${showerFloorSf.toFixed(1)} sf floor, ${showerWallSf.toFixed(0)} sf walls @ ${showerWallHeight} ft height)`);
    }
    lines.push('');
    lines.push(`SELECTED FINISHES & FIXTURES`);
    lineItems.forEach((li) => {
      lines.push(`- ${li.label}: ${li.optionName}${li.qtyLabel ? ` (${li.qtyLabel})` : ''}`);
      if (li.notes) lines.push(`    note: ${li.notes}`);
    });
    lines.push('');
    lines.push(`CONCEPT PRICE RANGE`);
    lines.push(`- Good total: ${fmt(totals.good)}`);
    lines.push(`- Better total: ${fmt(totals.better)}`);
    lines.push(`- Best total: ${fmt(totals.best)}`);
    lines.push(`- Client-facing range: ${fmt(totals.good)} – ${fmt(totals.best)}`);
    lines.push('');
    lines.push(`This is a rough concept estimate based on rep-entered scope. Final pricing and`);
    lines.push(`design require a full site visit, measurement verification, and detailed scope review.`);
    return lines.join('\n');
  };

  const sendEmail = () => {
    const notes = buildNotes();
    const subject = `Bathroom Estimate Notes${clientName ? ` — ${clientName}` : ''}`;
    const to = recipients.join(',');
    const body = encodeURIComponent(notes);
    window.location.href = `mailto:${to}?subject=${encodeURIComponent(subject)}&body=${body}`;
  };

  const restart = () => {
    setStep(0);
    setRoomL(''); setRoomW(''); setWallHeight('8'); setVaulted(null);
    setFloorFinish(null); setWallFinish(null);
    setShowerConfig(null); setShowerL(''); setShowerW('');
    setShowerBase(null); setShowerSurround(null); setTubUnit(null); setEnclosure(null);
    setVanityWidth(''); setVanityType(null); setToiletNew(null);
    setVanityFaucetCount('1'); setVanityFaucet(null); setShowerTrim(null);
    setElectricalScope(null); setVentFan(null); setMirror(null); setAccessories(null);
    setIncludeDemo(null); setClientName('');
  };

  const renderStep = () => {
    switch (stepKey) {
      case 'intro':
        return (
          <StepShell title="Bathroom Remodel — Concept Estimate" hint="Walk through the project scope step by step. We'll build a Good / Better / Best price range as you go.">
            <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: '#B8C2C4', marginBottom: 8 }}>
              Client / project name (optional)
            </label>
            <input
              type="text"
              value={clientName}
              onChange={(e) => setClientName(e.target.value)}
              placeholder="e.g. Johnson Residence"
              style={{ width: '100%', maxWidth: 360, padding: '12px 14px', fontSize: 15, border: '1px solid #3A3F42', borderRadius: 8, outline: 'none', color: '#F2F4F4', background: '#16191B' }}
            />
          </StepShell>
        );

      case 'geometry':
        return (
          <StepShell title="Room dimensions" hint="Length and width of the bathroom (gives us floor, wall, and ceiling area).">
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 24, marginBottom: 20 }}>
              <div>
                <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: '#B8C2C4', marginBottom: 8 }}>Room length</label>
                <NumInput value={roomL} onChange={setRoomL} suffix="ft" width={90} placeholder="e.g. 10" />
              </div>
              <div>
                <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: '#B8C2C4', marginBottom: 8 }}>Room width</label>
                <NumInput value={roomW} onChange={setRoomW} suffix="ft" width={90} placeholder="e.g. 6" />
              </div>
              <div>
                <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: '#B8C2C4', marginBottom: 8 }}>Wall height</label>
                <NumInput value={wallHeight} onChange={setWallHeight} suffix="ft" width={90} />
              </div>
            </div>
            {roomLNum > 0 && roomWNum > 0 && (
              <div style={{ marginBottom: 20, fontSize: 13, color: '#8A9598' }}>
                Floor area: {roomSfNum.toFixed(0)} sf · Perimeter: {roomPerimeter.toFixed(1)} ft · Wall area: {(roomPerimeter * wallHeightNum).toFixed(0)} sf
              </div>
            )}
            <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: '#B8C2C4', marginBottom: 8 }}>Vaulted / sloped ceiling?</label>
            <div style={{ display: 'flex', gap: 10, maxWidth: 360 }}>
              <OptionCard label="No — flat ceiling" active={vaulted === false} onClick={() => setVaulted(false)} />
              <OptionCard label="Yes — vaulted" sub="adds ~25% to ceiling area" active={vaulted === true} onClick={() => setVaulted(true)} />
            </div>
          </StepShell>
        );

      case 'floor':
        return (
          <StepShell title="Room floor finish" hint={`Applies to the full bathroom floor (${roomSfNum.toFixed(0)} sq ft).`}>
            <div style={{ display: 'grid', gap: 10 }}>
              {getOptions('Floor Finish').map((o) => (
                <OptionCard key={o.option} label={o.option} sub={o.notes} price={`${fmt(o.good)}–${fmt(o.best)}/${o.unit}`} active={floorFinish === o.option} onClick={() => setFloorFinish(o.option)} />
              ))}
            </div>
          </StepShell>
        );

      case 'walls':
        return (
          <StepShell title="Room wall finish" hint="Applies to room walls outside the shower/tub area (paint, accent tile, etc.).">
            <div style={{ display: 'grid', gap: 10 }}>
              {getOptions('Wall Finish').map((o) => (
                <OptionCard key={o.option} label={o.option} sub={o.notes} price={`${fmt(o.good)}–${fmt(o.best)}/${o.unit}`} active={wallFinish === o.option} onClick={() => setWallFinish(o.option)} />
              ))}
            </div>
          </StepShell>
        );

      case 'showerConfig':
        return (
          <StepShell title="Shower / tub configuration" hint="This drives the shower base, wall surround, and fixture options.">
            <div style={{ display: 'grid', gap: 10 }}>
              {SHOWER_CONFIGS.map((c) => (
                <OptionCard key={c.key} label={c.label} sub={c.sub} active={showerConfig === c.key} onClick={() => setShowerConfig(c.key)} />
              ))}
            </div>
          </StepShell>
        );

      case 'showerDims':
        return (
          <StepShell title="Shower dimensions" hint="Used to calculate shower base area and wall surround area (walls tiled to 8ft, or ceiling height if lower).">
            <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
              <NumInput value={showerL} onChange={setShowerL} suffix="ft" width={90} placeholder="L" />
              <span style={{ color: '#8A9598', fontSize: 18 }}>×</span>
              <NumInput value={showerW} onChange={setShowerW} suffix="ft" width={90} placeholder="W" />
            </div>
            {showerLNum > 0 && showerWNum > 0 && (
              <div style={{ marginTop: 16, fontSize: 13, color: '#6FA8B8' }}>
                Floor area: {showerFloorSf.toFixed(1)} sf · Wall surround area (at {showerWallHeight} ft): {showerWallSf.toFixed(0)} sf
              </div>
            )}
          </StepShell>
        );

      case 'showerBase':
        return (
          <StepShell title="Shower / tub base material" hint={needsShowerDims ? `Floor area of shower: ${showerFloorSf.toFixed(1)} sf` : 'Standard tub/shower base'}>
            <div style={{ display: 'grid', gap: 10 }}>
              {getOptions('Base Material').map((o) => (
                <OptionCard key={o.option} label={o.option} sub={o.notes} price={o.unit === 'sq ft' ? `${fmt(o.good)}–${fmt(o.best)}/sf` : `${fmt(o.good)}–${fmt(o.best)} flat`} active={showerBase === o.option} onClick={() => setShowerBase(o.option)} />
              ))}
            </div>
          </StepShell>
        );

      case 'showerSurround':
        return (
          <StepShell title="Shower / tub wall surround" hint={needsShowerDims ? `Surround area: ${showerWallSf.toFixed(0)} sf (to ${showerWallHeight}ft)` : 'Standard tub alcove surround (approx.)'}>
            <div style={{ display: 'grid', gap: 10 }}>
              {getOptions('Wall Surround').map((o) => (
                <OptionCard key={o.option} label={o.option} sub={o.notes} price={o.unit === 'sq ft' ? `${fmt(o.good)}–${fmt(o.best)}/sf` : `${fmt(o.good)}–${fmt(o.best)} flat`} active={showerSurround === o.option} onClick={() => setShowerSurround(o.option)} />
              ))}
            </div>
          </StepShell>
        );

      case 'tubUnit':
        return (
          <StepShell title="Tub unit" hint="Select the tub being installed.">
            <div style={{ display: 'grid', gap: 10 }}>
              {getOptions('Tub Unit').map((o) => (
                <OptionCard key={o.option} label={o.option} sub={o.notes} price={`${fmt(o.good)}–${fmt(o.best)}`} active={tubUnit === o.option} onClick={() => setTubUnit(o.option)} />
              ))}
            </div>
          </StepShell>
        );

      case 'enclosure':
        return (
          <StepShell title="Shower enclosure" hint="Glass, door, or curtain for the shower.">
            <div style={{ display: 'grid', gap: 10 }}>
              {getOptions('Enclosure').map((o) => (
                <OptionCard key={o.option} label={o.option} sub={o.notes} price={`${fmt(o.good)}–${fmt(o.best)}`} active={enclosure === o.option} onClick={() => setEnclosure(o.option)} />
              ))}
            </div>
          </StepShell>
        );

      case 'vanity':
        return (
          <StepShell title="Vanity" hint="Enter vanity width (0 if keeping existing vanity).">
            <div style={{ marginBottom: 18 }}>
              <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: '#B8C2C4', marginBottom: 8 }}>Vanity width</label>
              <NumInput value={vanityWidth} onChange={setVanityWidth} suffix="linear ft" placeholder="0" />
            </div>
            {vanityWidthNum > 0 && (
              <div style={{ display: 'grid', gap: 10 }}>
                {getOptions('Vanity Cabinet').map((o) => (
                  <OptionCard key={o.option} label={o.option} sub={o.notes} price={`${fmt(o.good)}–${fmt(o.best)}/linear ft`} active={vanityType === o.option} onClick={() => setVanityType(o.option)} />
                ))}
              </div>
            )}
            {vanityWidthNum === 0 && (
              <OptionCard label="Keep existing vanity" sub="No vanity cost added" active={vanityType === 'keep'} onClick={() => setVanityType('keep')} />
            )}
          </StepShell>
        );

      case 'toilet':
        return (
          <StepShell title="Toilet" hint="New toilet, or keep existing?">
            <div style={{ display: 'grid', gap: 10 }}>
              <OptionCard label="Keep existing toilet" active={toiletNew === 'none'} onClick={() => setToiletNew('none')} />
              {getOptions('Toilet').map((o) => (
                <OptionCard key={o.option} label={o.option} sub={o.notes} price={`${fmt(o.good)}–${fmt(o.best)}`} active={toiletNew === o.option} onClick={() => setToiletNew(o.option)} />
              ))}
            </div>
          </StepShell>
        );

      case 'vanityFaucet':
        return (
          <StepShell title="Vanity faucet(s)" hint="How many sinks/faucets, and what tier?">
            <div style={{ marginBottom: 18 }}>
              <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: '#B8C2C4', marginBottom: 8 }}>Number of faucets</label>
              <NumInput value={vanityFaucetCount} onChange={setVanityFaucetCount} suffix="faucet(s)" width={90} />
            </div>
            <div style={{ display: 'grid', gap: 10 }}>
              {getOptions('Vanity Faucet').map((o) => (
                <OptionCard key={o.option} label={o.option} sub={o.notes} price={`${fmt(o.good)}–${fmt(o.best)} each`} active={vanityFaucet === o.option} onClick={() => setVanityFaucet(o.option)} />
              ))}
            </div>
          </StepShell>
        );

      case 'showerTrim':
        return (
          <StepShell title="Shower fixtures" hint="Valve, trim, and showerhead style.">
            <div style={{ display: 'grid', gap: 10 }}>
              {getOptions('Shower Trim/Valve').map((o) => (
                <OptionCard key={o.option} label={o.option} sub={o.notes} price={`${fmt(o.good)}–${fmt(o.best)}`} active={showerTrim === o.option} onClick={() => setShowerTrim(o.option)} />
              ))}
            </div>
          </StepShell>
        );

      case 'electrical':
        return (
          <StepShell title="Electrical scope" hint="Any electrical work beyond fixture swaps?">
            <div style={{ display: 'grid', gap: 10 }}>
              {getOptions('Electrical Scope').map((o) => (
                <OptionCard key={o.option} label={o.option} sub={o.notes} price={o.good === 0 ? 'included' : `${fmt(o.good)}–${fmt(o.best)}`} active={electricalScope === o.option} onClick={() => setElectricalScope(o.option)} />
              ))}
            </div>
          </StepShell>
        );

      case 'ventFan':
        return (
          <StepShell title="Ventilation fan" hint="Exhaust fan scope.">
            <div style={{ display: 'grid', gap: 10 }}>
              {getOptions('Ventilation Fan').map((o) => (
                <OptionCard key={o.option} label={o.option} sub={o.notes} price={o.good === 0 ? 'included' : `${fmt(o.good)}–${fmt(o.best)}`} active={ventFan === o.option} onClick={() => setVentFan(o.option)} />
              ))}
            </div>
          </StepShell>
        );

      case 'mirror':
        return (
          <StepShell title="Mirror" hint="New mirror, or keep existing?">
            <div style={{ display: 'grid', gap: 10 }}>
              <OptionCard label="Keep existing mirror" active={mirror === 'none'} onClick={() => setMirror('none')} />
              {getOptions('Mirror').map((o) => (
                <OptionCard key={o.option} label={o.option} sub={o.notes} price={`${fmt(o.good)}–${fmt(o.best)}`} active={mirror === o.option} onClick={() => setMirror(o.option)} />
              ))}
            </div>
          </StepShell>
        );

      case 'accessories':
        return (
          <StepShell title="Accessories" hint="Towel bars, hooks, TP holder, etc.">
            <div style={{ display: 'grid', gap: 10 }}>
              <OptionCard label="Keep existing accessories" active={accessories === 'none'} onClick={() => setAccessories('none')} />
              {getOptions('Accessories Package').map((o) => (
                <OptionCard key={o.option} label={o.option} sub={o.notes} price={`${fmt(o.good)}–${fmt(o.best)}`} active={accessories === o.option} onClick={() => setAccessories(o.option)} />
              ))}
            </div>
          </StepShell>
        );

      case 'demo':
        return (
          <StepShell title="Demo & disposal" hint="Include standard demo and haul-away of existing finishes/fixtures?">
            <div style={{ display: 'grid', gap: 10, maxWidth: 400 }}>
              <OptionCard label="Yes, include demo & disposal" price={`${fmt(findOption('Demo & Disposal','Standard Bath Demo')?.good || 0)}–${fmt(findOption('Demo & Disposal','Standard Bath Demo')?.best || 0)}`} active={includeDemo === true} onClick={() => setIncludeDemo(true)} />
              <OptionCard label="No, exclude from this estimate" active={includeDemo === false} onClick={() => setIncludeDemo(false)} />
            </div>
          </StepShell>
        );

      case 'summary':
        return (
          <StepShell title="Concept price range" hint={clientName ? `Project: ${clientName}` : null}>
            <div style={{
              background: '#0099B9', color: '#0D0F10', borderRadius: 14, padding: '28px 24px', marginBottom: 24,
              textAlign: 'center',
            }}>
              <div style={{ fontSize: 12, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#9FD4E3', marginBottom: 8 }}>
                Estimated Range (Good – Best)
              </div>
              <div style={{ fontFamily: "'Fraunces', serif", fontSize: 38, fontWeight: 600 }}>
                {fmt(totals.good)} – {fmt(totals.best)}
              </div>
              <div style={{ fontSize: 13, color: '#9FD4E3', marginTop: 6 }}>
                "Better" midpoint estimate: {fmt(totals.better)}
              </div>
            </div>

            <div style={{ marginBottom: 20 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: '#6FA8B8', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 10 }}>
                Scope Summary
              </div>
              <div style={{ display: 'grid', gap: 6 }}>
                {lineItems.map((li, i) => (
                  <div key={i} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, padding: '8px 0', borderBottom: '1px solid #2A2E30' }}>
                    <div>
                      <span style={{ fontWeight: 600 }}>{li.label}:</span> {li.optionName} {li.qtyLabel && <span style={{ color: '#8A9598' }}>({li.qtyLabel})</span>}
                    </div>
                    <div style={{ color: '#8A9598', whiteSpace: 'nowrap', marginLeft: 12 }}>
                      {fmt(li.good)} – {fmt(li.best)}
                    </div>
                  </div>
                ))}
                {lineItems.length === 0 && <div style={{ fontSize: 13, color: '#8A9598' }}>No items selected.</div>}
              </div>
            </div>

            <div style={{ marginBottom: 20 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: '#6FA8B8', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 10 }}>
                Send notes to
              </div>
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 10 }}>
                {recipients.map((r, i) => (
                  <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 6, background: '#23292B', borderRadius: 20, padding: '6px 12px', fontSize: 12 }}>
                    {r}
                    <span style={{ cursor: 'pointer', color: '#B85C5C', fontWeight: 700 }} onClick={() => saveRecipients(recipients.filter((_, idx) => idx !== i))}>×</span>
                  </div>
                ))}
              </div>
              <div style={{ display: 'flex', gap: 8 }}>
                <input
                  type="email"
                  value={recipientInput}
                  onChange={(e) => setRecipientInput(e.target.value)}
                  placeholder="add email address"
                  style={{ flex: 1, maxWidth: 280, padding: '10px 12px', fontSize: 13, border: '1px solid #3A3F42', borderRadius: 8, outline: 'none', background: '#16191B', color: '#F2F4F4' }}
                />
                <button
                  onClick={() => { if (recipientInput.trim()) { saveRecipients([...recipients, recipientInput.trim()]); setRecipientInput(''); } }}
                  style={{ padding: '10px 16px', fontSize: 13, fontWeight: 600, border: '1px solid #3A3F42', borderRadius: 8, background: '#16191B', cursor: 'pointer', color: '#B8C2C4' }}
                >
                  Add
                </button>
              </div>
            </div>

            <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
              <button
                onClick={sendEmail}
                style={{ display: 'inline-flex', alignItems: 'center', gap: 8, padding: '12px 20px', background: '#0099B9', color: '#0D0F10', borderRadius: 8, fontSize: 14, fontWeight: 600, border: 'none', cursor: 'pointer' }}
              >
                <Mail size={16} /> Email scope notes
              </button>
              <button
                onClick={restart}
                style={{ display: 'inline-flex', alignItems: 'center', gap: 8, padding: '12px 20px', background: '#16191B', border: '1px solid #3A3F42', borderRadius: 8, fontSize: 14, fontWeight: 600, cursor: 'pointer', color: '#B8C2C4' }}
              >
                <RotateCcw size={16} /> Start new estimate
              </button>
            </div>

            <div style={{ marginTop: 18, fontSize: 12, color: '#6B7578' }}>
              <ChevronRight size={14} style={{ verticalAlign: 'middle' }} /> Rough concept estimate only — confirm with full scope review before quoting.
            </div>
          </StepShell>
        );

      default:
        return null;
    }
  };

  const showFooterNav = stepKey !== 'summary';

  return (
    <div style={{ minHeight: '100vh', background: '#0D0F10', fontFamily: "'Inter', system-ui, sans-serif", color: '#F2F4F4' }}>
      <div style={{ maxWidth: 760, margin: '0 auto', padding: '28px 20px 100px' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 10, marginBottom: 24, flexWrap: 'wrap' }}>
          <img src="./logo.png" alt="Kerry Bramon Remodeling & Design" style={{ height: 44, display: 'block' }} />
          <div style={{ fontSize: 13, fontWeight: 600, color: '#6FA8B8', letterSpacing: '0.08em', textTransform: 'uppercase' }}>
            Bathroom Estimate
          </div>
        </div>

        {stepKey !== 'summary' && (
          <div style={{ height: 4, background: '#2A2E30', borderRadius: 4, marginBottom: 28, overflow: 'hidden' }}>
            <div style={{ height: '100%', background: '#0099B9', width: `${((stepIndex + 1) / (totalSteps - 1)) * 100}%`, transition: 'width 0.2s ease' }} />
          </div>
        )}
        {stepKey === 'summary' && <div style={{ marginBottom: 28 }} />}

        <div style={{ background: '#16191B', border: '1px solid #2A2E30', borderRadius: 16, padding: 28, marginBottom: 20 }}>
          {renderStep()}
        </div>

        {showFooterNav && (
          <div style={{ display: 'flex', justifyContent: 'space-between' }}>
            <button
              onClick={goBack}
              disabled={step === 0}
              style={{ display: 'inline-flex', alignItems: 'center', gap: 6, padding: '12px 20px', background: '#16191B', border: '1px solid #3A3F42', borderRadius: 8, fontSize: 14, fontWeight: 600, cursor: 'pointer', color: '#B8C2C4' }}
            >
              <ChevronLeft size={16} /> Back
            </button>
            <button
              onClick={goNext}
              disabled={!canAdvance()}
              style={{ display: 'inline-flex', alignItems: 'center', gap: 6, padding: '12px 20px', background: '#0099B9', color: '#0D0F10', border: 'none', borderRadius: 8, fontSize: 14, fontWeight: 600, cursor: 'pointer' }}
            >
              {stepIndex === totalSteps - 2 ? 'See estimate' : 'Next'} <ChevronRight size={16} />
            </button>
          </div>
        )}

        <div style={{ borderTop: '1px solid #2A2E30', marginTop: 40, paddingTop: 16, fontSize: 12, color: '#6B7578', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 6, flexWrap: 'wrap' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <FileSpreadsheet size={14} style={{ flexShrink: 0 }} />
            {pricingSource === 'remote' && 'Pricing loaded from live pricing sheet.'}
            {pricingSource === 'file' && 'Pricing loaded from pricing.json.'}
            {pricingSource === 'default' && 'Using built-in default pricing.'}
            {!pricingSource && 'Loading pricing\u2026'}
          </div>
          <a href="./admin.html" style={{ color: '#6B7578', textDecoration: 'underline' }}>Pricing admin</a>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<BathroomEstimateApp />);
</script>


</body></html>
